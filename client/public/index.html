<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f0f4f8" />
    <meta name="description" content="MindTrack — система психологической поддержки для выявления выгорания" />
    <title>MindTrack — Психологическая поддержка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=Marck+Script&family=Nunito:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('burnout_theme');
          if (t === 'dark') {
            localStorage.setItem('burnout_theme', 'light');
          }
          document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>Для работы приложения необходим JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
