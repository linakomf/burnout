<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1d3a" />
    <meta name="description" content="MindTrack — система психологической поддержки для выявления выгорания" />
    <title>MindTrack — Психологическая поддержка</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('burnout_theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>Для работы приложения необходим JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
