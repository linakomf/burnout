services:
  - type: web
    name: burnout-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: burnout-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://burnout-lswd.vercel.app
      - key: CORS_EXTRA_ORIGINS
        value: https://client-eosin-beta-38.vercel.app,https://client-linakomfs-projects.vercel.app

databases:
  - name: burnout-db
    plan: free
