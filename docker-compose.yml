services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: burnout_db
    ports:
      - '5432:5432'
    volumes:
      - burnout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d burnout_db']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  burnout_pgdata:
